name: Sync file da Dropbox
 
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
 
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
 
      - name: Cancella vecchio file e scarica da Dropbox
        run: |
          DROPBOX_URL="https://www.dropbox.com/scl/fi/4tngypsxhxyiiunq4fcsm/dati.xlsx?rlkey=xe3q06bklct4sqjsmxg93hsm8&st=1580uivv&dl=1"
          
          # Cancella il file esistente
          rm -f dati.xlsx
          echo "File vecchio eliminato"
          
          # Scarica il nuovo
          echo "Download da Dropbox..."
          HTTP_CODE=$(curl -L "${DROPBOX_URL}" \
            -o dati.xlsx \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            -w "%{http_code}" -s)
          
          echo "HTTP: ${HTTP_CODE}"
          FILE_SIZE=$(wc -c < dati.xlsx)
          echo "Dimensione: ${FILE_SIZE} bytes"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] && [ "$FILE_SIZE" -gt 5000 ]; then
            echo "✅ Download riuscito"
          else
            echo "❌ Download fallito (HTTP ${HTTP_CODE}, size ${FILE_SIZE})"
            exit 1
          fi
 
      - name: Commit e push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git rm --cached dati.xlsx 2>/dev/null || true
          git add dati.xlsx
          git commit -m "Aggiornamento dati $(date '+%d/%m/%Y %H:%M')"
          git push --force-with-lease origin main

name: Sync file da Dropbox
 
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
 
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Scarica file da Dropbox
        run: |
          DROPBOX_URL="https://www.dropbox.com/scl/fi/4tngypsxhxyiiunq4fcsm/dati.xlsx?rlkey=xe3q06bklct4sqjsmxg93hsm8&st=1580uivv&dl=1"
          echo "Download da Dropbox..."
          HTTP_CODE=$(curl -L "${DROPBOX_URL}" \
            -o dati.xlsx \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            -w "%{http_code}" -s)
          echo "HTTP: ${HTTP_CODE}"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            FILE_SIZE=$(wc -c < dati.xlsx)
            echo "✅ Download riuscito — ${FILE_SIZE} bytes"
            if [ "$FILE_SIZE" -lt 5000 ]; then
              echo "❌ File troppo piccolo"
              cat dati.xlsx
              exit 1
            fi
          else
            echo "❌ Fallito (HTTP ${HTTP_CODE})"
            exit 1
          fi
 
      - name: Commit e push se modificato
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add dati.xlsx
          if git diff --staged --quiet; then
            echo "Nessuna modifica, skip"
          else
            git commit -m "Aggiornamento dati $(date '+%d/%m/%Y %H:%M')"
            git push origin main
          fi
